---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vllm-bench-master
  namespace: bench
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vllm-bench-master
  namespace: bench
rules:
  -
    apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
      - watch
      - create
      - delete
      - patch
  -
    apiGroups:
      - ""
    resources:
      - pods/log
    verbs:
      - get
      - list
  -
    apiGroups:
      - ""
    resources:
      - services
    verbs:
      - get
      - list
      - watch
      - create
      - delete
      - patch
  -
    apiGroups:
      - ""
    resources:
      - events
    verbs:
      - get
      - list
      - watch
  -
    apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - get
      - list
  -
    apiGroups:
      - batch
    resources:
      - jobs
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vllm-bench-master
  namespace: bench
subjects:
  -
    kind: ServiceAccount
    name: vllm-bench-master
    namespace: bench
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vllm-bench-master
