schema: spec-driven

context: |
  项目名称：国产卡 vLLM 自动化压测平台

  开发方式：
  - 本项目必须严格遵守 Spec-first 开发方式。
  - 用户确认相关 OpenSpec proposal、design、specs、tasks 之前，不允许写业务代码。
  - 每次新增能力、修改能力、重构能力，都必须先创建 OpenSpec change。
  - 每一步实现都必须能回溯到已确认的 OpenSpec change。
  - 使用 Superpower 风格管理上下文：重要决策、架构约束、目录结构、命名规范、
    阶段性结论必须先写入项目文档，再进入实现。
  - 优先完成 MVP。未经确认，不允许擅自扩大范围。
  - 本项目文档、OpenSpec artifact、任务拆分和面向用户的说明默认使用中文。
  - vllm_bench_platform/**/*.py 源码整体注释率不得低于 40%；注释必须解释业务意图、
    OpenSpec 约束、Kubernetes 资源设计、失败处理或维护注意点，不能只机械复述代码。

  项目背景：
  - 平台运行在 Kubernetes 环境中，用于自动化压测国产 AI 加速卡上的 vLLM 服务。
  - 平台需要组合不同国产卡 vendor profile、vLLM 镜像、模型配置、服务端参数和压测参数。
  - 平台负责启动 target vLLM 服务、执行压测、收集日志/结果/events，并分析最优配置。

  MVP 架构：
  - 用户侧流程：frontend -> backend -> Kubernetes Master Job -> Master Pod。
  - Master Pod 包含两个容器：
    - master-controller：读取配置，创建/删除 target vLLM Pod 和 Service，控制
      serve_config x bench_config 循环，写入 summary，汇总结果。
    - bench-runner：在 localhost:18080 启动轻量 HTTP agent，调用
      vllm-project/vllm-bench，并输出 JSON 结果。
  - master-controller 通过 localhost:18080 调用 bench-runner。
  - master-controller 通过 Kubernetes API 动态创建 target vLLM Pod 和 Service。
  - 只有 target vLLM Pod 申请国产卡资源。
  - master-controller 和 bench-runner 不申请国产卡资源。
  - target vLLM Pod 不直接写入压测结果。
  - target vLLM Pod 的 logs 和 Kubernetes events 由 master-controller 抓取后写入 PVC。

  核心执行规则：
  - bench_config 变化时，不重启 target vLLM Pod。
  - serve_config 变化时，必须删除旧 target Service 和 target vLLM Pod，再创建新的
    target Service 和 target vLLM Pod。
  - bench-runner 访问 target vLLM 时必须通过 target Service，不能使用 localhost 或
    Pod IP。
  - Master Pod 内两个容器共享 /configs、/results 和 /work。
  - MVP 阶段 PVC 可以使用 ReadWriteOnce；多 Worker Pod 并发写结果时再评估
    ReadWriteMany 或对象存储。
  - MVP 只支持单集群、单 namespace、单模型、单 vendor profile。
  - 多 vendor、多模型、多集群、Prometheus、Grafana、Kueue/Volcano、WebSocket
    日志、历史结果数据库、高级 Pareto 分析等能力均不属于 MVP。

  阶段性方案结论：
  - 不采用 600 个轻量 Worker Job 作为 MVP 主方案。
  - 不采用单容器重 Job 大脚本作为 MVP 主方案。
  - MVP 主方案封存为：后端创建 Master Job；Master Job 启动双容器 Master Pod；
    master-controller 动态创建国产 vLLM Pod + Service；bench-runner 执行轻量
    vllm-bench；每组 serve_config 重启一次 target vLLM Pod；同一 serve_config 下连续
    执行多组 bench_config；结果统一写入 PVC。

  MVP 必需能力：
  - 后端提交任务接口。
  - 后端任务状态查询接口。
  - 后端结果下载接口。
  - 后端失败 case 查看接口。
  - 后端生成 ConfigMap、PVC、Master Job。
  - Master Job 启动双容器 Master Pod。
  - master-controller 读取提交配置。
  - bench-runner 启动本地 HTTP agent。
  - master-controller 等待 bench-runner /health。
  - master-controller 创建 target vLLM Pod 和 target Service。
  - master-controller 等待 target /health。
  - master-controller 调用 bench-runner /run-bench。
  - bench-runner 调用 vllm-bench 并保存 raw JSON/log。
  - master-controller 写入 summary.csv 和 summary.jsonl。
  - bench 失败重试一次。
  - 重试后仍失败写入 failed_cases.jsonl。
  - 每组 serve_config 完成后删除 target Service 和 target Pod。
  - 全部完成后生成 best_config.json。
  - master-controller 调用 bench-runner /shutdown。
  - Master Job 正常结束。

  MVP 失败类型：
  - BENCH_TIMEOUT
  - BENCH_COMMAND_FAILED
  - RESULT_JSON_NOT_FOUND
  - RESULT_PARSE_FAILED
  - TARGET_POD_PENDING
  - TARGET_POD_FAILED
  - TARGET_HEALTH_TIMEOUT
  - TARGET_SERVER_CRASHED
  - TARGET_IMAGE_PULL_FAILED
  - TARGET_POD_DELETE_TIMEOUT
  - TARGET_POD_FORCE_DELETED
  - K8S_API_ERROR
  - UNKNOWN_ERROR

  必需输入配置文件：
  - serve_hparams.json：serve 参数列表。每一项必须包含 _benchmark_name。
  - bench_hparams.json：压测参数列表。每一项必须包含 _benchmark_name。
  - vendor_profile.json：vendor_name、target_vllm_image、resource_name、
    resource_count、env、node_selector、tolerations、runtime_class_name、
    shm_size、port、health_path、extra_serve_args。
  - model_config.json：model_name、model_path、served_model_name、
    trust_remote_code、dtype，可选 tokenizer_path。

  必需结果目录：
  - /results/{run_id}/summary.csv
  - /results/{run_id}/summary.jsonl
  - /results/{run_id}/failed_cases.jsonl
  - /results/{run_id}/best_config.json
  - /results/{run_id}/run_meta.json
  - /results/{run_id}/raw_json/
  - /results/{run_id}/raw_logs/
  - /results/{run_id}/server_logs/
  - /results/{run_id}/events/

  spec 确认后的推荐源码目录：
  - vllm_bench_platform/backend/
  - vllm_bench_platform/master/
  - vllm_bench_platform/bench_runner/
  - configs/
  - manifests/
  - docker/

rules:
  proposal:
    - 必须包含背景、目标、非目标、用户故事、约束条件、验收标准和风险点。
    - 除非用户明确确认更大范围，否则 proposal 必须限定在 MVP。
    - 必须声明：用户确认 proposal、design、specs、tasks 之前，不允许进入实现。
    - 默认使用中文。
  design:
    - 必须包含架构、数据流、组件职责、配置结构、接口设计、Kubernetes 资源设计、
      结果目录、重试/失败行为、清理行为和风险点。
    - 必须明确保留“只有 target vLLM Pod 申请国产卡资源”的规则。
    - 未经确认，不允许加入非 MVP 依赖或系统。
    - 默认使用中文。
  specs:
    - 使用 SHALL/MUST 形式描述规范要求，配套具体场景。
    - 必须覆盖后端提交、Master Job 创建、target 生命周期、bench-runner 交互、
      结果写入、失败重试、资源清理和 best-config 生成。
    - 默认使用中文。
  tasks:
    - 任务必须拆成可 review、可追溯的 MVP 小任务。
    - 每个实现任务必须引用 OpenSpec capability 或 requirement。
    - 每个任务必须包含验证或测试预期。
    - 默认使用中文。
