apiVersion: v1
kind: PersistentVolume
metadata:
  name: vllm-bench-results-example
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  hostPath:
    path: /tmp/vllm-bench-results
    type: DirectoryOrCreate
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-bench-results-example
  namespace: bench
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  volumeName: vllm-bench-results-example
  resources:
    requests:
      storage: 20Gi
