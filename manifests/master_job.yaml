apiVersion: batch/v1
kind: Job
metadata:
  name: vllm-bench-master-example
  namespace: bench
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: vllm-bench-master
        run_id: example
    spec:
      restartPolicy: Never
      serviceAccountName: vllm-bench-master
      volumes:
        - name: configs
          configMap:
            name: vllm-bench-config-example
        - name: results
          persistentVolumeClaim:
            claimName: vllm-bench-results-example
        - name: work
          emptyDir: {}
      containers:
        - name: master-controller
          image: vllm-bench-platform/master:latest
          command: ["python3", "-m", "vllm_bench_platform.master.master"]
          env:
            - name: RUN_ID
              value: example
            - name: NAMESPACE
              value: bench
          volumeMounts:
            - name: configs
              mountPath: /configs
            - name: results
              mountPath: /results
            - name: work
              mountPath: /work
        - name: bench-runner
          image: vllm-bench-platform/bench-runner:latest
          command: ["python3", "-m", "vllm_bench_platform.bench_runner.bench_agent"]
          ports:
            - containerPort: 18080
              name: http
          env:
            - name: BENCH_COMMAND
              value: vllm bench serve
            - name: BENCH_TIMEOUT_SECONDS
              value: "1800"
            - name: BENCH_NUM_PROMPTS
              value: "10"
          volumeMounts:
            - name: configs
              mountPath: /configs
            - name: results
              mountPath: /results
            - name: work
              mountPath: /work
